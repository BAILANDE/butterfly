<svg width="350" height="150" viewBox="0 0 350 150" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="350" height="150" fill="#f5f5f5" />

  <!-- 渐变条 -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#50e3c2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect x="0" y="120" width="350" height="10" fill="url(#grad1)" />

  <!-- 主标题 -->
  <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, Helvetica, sans-serif" font-size="36" fill="#333">
    即刻短文
  </text>

  <!-- 装饰线条 -->
  <line x1="20" y1="30" x2="330" y2="30" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="20" y1="120" x2="330" y2="120" stroke="#ccc" stroke-width="1" stroke-dasharray="4 4"/>
</svg>