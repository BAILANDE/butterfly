<svg width="350" height="150" viewBox="0 0 350 150" xmlns="http://www.w3.org/2000/svg">

  <!-- 渐变背景 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>

    <!-- 主渐变 -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4a90e2"/>
      <stop offset="100%" stop-color="#50e3c2"/>
    </linearGradient>
  </defs>

  <rect width="350" height="150" fill="url(#bg)" rx="12"/>

  <!-- 左侧装饰块 -->
  <rect x="0" y="0" width="6" height="150" fill="url(#accent)" rx="3"/>

  <!-- 半透明装饰圆 -->
  <circle cx="300" cy="30" r="40" fill="#4a90e2" opacity="0.05"/>
  <circle cx="320" cy="120" r="50" fill="#50e3c2" opacity="0.05"/>

  <!-- 标题 -->
  <text x="50%" y="52%" text-anchor="middle" dominant-baseline="middle"
        font-family="PingFang SC, Helvetica, Arial, sans-serif"
        font-size="38" font-weight="600" fill="#222">
    装模做样
  </text>

  <!-- 英文小字 -->
  <text x="50%" y="72%" text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="12" letter-spacing="2" fill="#888">
    书评
  </text>

  <!-- 底部细线 -->
  <rect x="30" y="120" width="290" height="2" fill="url(#accent)" rx="1"/>

</svg>